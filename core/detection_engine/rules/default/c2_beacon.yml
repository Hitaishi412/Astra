title: Suspicious C2 Beacon Port
id: c2_beacon_port
description: Detects connections to ports commonly used by C2 frameworks (Cobalt Strike, Metasploit, etc.).
status: experimental
logsource:
    category: network
detection:
    selection:
        destination_port:
            - 4444
            - 31337
            - 6666
            - 8443
            - 50050
    condition: selection | count(source_ip) > 3
    timeframe: 5m
level: high
tags:
    - attack.command_and_control
    - attack.t1071.001
