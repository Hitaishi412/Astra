title: Brute Force Login Attempt
id: brute_force_login
description: Detects multiple failed login attempts from the same source IP within a short window — classic brute force pattern.
status: experimental
logsource:
    category: authentication
detection:
    selection:
        event_id:
            - 4625
            - 529
        category: authentication
    condition: selection | count(source_ip) > 5
    timeframe: 5m
level: high
tags:
    - attack.credential_access
    - attack.t1110.001
